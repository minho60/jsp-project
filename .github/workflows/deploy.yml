name: Deploy JSP Project to AWS EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. WAR 빌드 (src/main/webapp 구조 기준)
    - name: Build WAR
      run: |
        mkdir -p dist
        cd src/main/webapp
        jar -cvf ../../../dist/ROOT.war *
        cd ../../..

    # 2. EC2로 WAR 파일 전송
    - name: Transfer WAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "dist/ROOT.war"
        target: "/home/ubuntu/"
        strip_components: 1

    # 3. 톰캣 배포 및 재시작 (경로: /opt/tomcat)
    - name: Deploy to Tomcat 9
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 톰캣 실행 경로 설정
          TOMCAT_WEBAPPS="/opt/tomcat/webapps"
          
          # 기존 앱 삭제
          sudo rm -rf $TOMCAT_WEBAPPS/ROOT
          sudo rm -f $TOMCAT_WEBAPPS/ROOT.war
          
          # 새 파일 이동 및 권한 설정
          sudo mv /home/ubuntu/ROOT.war $TOMCAT_WEBAPPS/
          sudo chown ubuntu:ubuntu $TOMCAT_WEBAPPS/ROOT.war
          
          # 톰캣 재시작
          sudo sh /opt/tomcat/bin/shutdown.sh || true
          sleep 3
          sudo sh /opt/tomcat/bin/startup.sh