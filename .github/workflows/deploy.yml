name: Deploy JSP Project to AWS EC2

on:
  push:
    branches: [ "main" ] # 배포할 브랜치 설정

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # src/main/webapp 구조를 기준으로 WAR 빌드
    - name: Build WAR File
      run: |
        mkdir -p dist
        # 1. 컴파일된 클래스 파일들이 WEB-INF/classes에 있다고 가정하거나, 
        # 직접 컴파일이 필요하면 javac 단계가 추가되어야 합니다.
        # 여기서는 webapp 폴더의 내용을 바탕으로 ROOT.war를 생성합니다.
        cd src/main/webapp
        jar -cvf ../../../dist/ROOT.war *
        cd ../../..

    - name: Transfer WAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "dist/ROOT.war"
        target: "/home/ubuntu/"
        strip_components: 1

    - name: Deploy to Tomcat 9
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. 기존 배포된 ROOT 디렉토리 및 WAR 삭제
          sudo rm -rf /var/lib/tomcat9/webapps/ROOT
          sudo rm -f /var/lib/tomcat9/webapps/ROOT.war
          
          # 2. 새로운 WAR 파일 이동
          sudo mv /home/ubuntu/ROOT.war /var/lib/tomcat9/webapps/
          
          # 3. 소유권 변경 및 톰캣 재시작
          sudo chown tomcat:tomcat /var/lib/tomcat9/webapps/ROOT.war
          sudo systemctl restart tomcat9