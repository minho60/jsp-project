name: Deploy Pure JSP Project to AWS EC2

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest

      # 3. EC2 접속 및 배포
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 컨테이너 중지 및 삭제
            docker stop subwaykr || true
            docker rm subwaykr || true
            
            # 최신 이미지 Pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest
            
            # 컨테이너 실행 (80포트 -> 8080포트 연결)
            # DB 연결 정보는 환경변수로 전달 (자바 코드에서 읽어야 함)
            docker run -d --name subwaykr -p 80:8080 \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest
            
            # 사용하지 않는 이미지 정리
            docker image prune -f