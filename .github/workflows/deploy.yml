name: Deploy subwaykr to AWS EC2

on:
  push:
    branches: [ "main" ]
    # jsp-project 레포지토리 루트의 파일들이 변경될 때 실행
    paths:
      - '**' 
      - '!README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. 이미지 빌드 및 푸시
      # context를 . 으로 설정하여 레포지토리 루트의 Dockerfile을 읽도록 합니다.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest

      # 3. SSH 접속하여 EC2에 배포
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 컨테이너 중지 및 삭제 (오류 무시)
            docker stop subwaykr || true
            docker rm subwaykr || true
            
            # 2. 최신 이미지 Pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest
            
            # 3. 컨테이너 실행
            # JSP/Servlet 앱이 DB 연결 정보를 환경변수로 받도록 설정되어 있어야 합니다.
            docker run -d --name subwaykr -p 80:8080 \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              ${{ secrets.DOCKERHUB_USERNAME }}/subwaykr:latest
            
            # 4. 사용하지 않는 구형 이미지 정리
            docker image prune -f